services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bolao_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: bolao_dev_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bolao_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata_dev:
